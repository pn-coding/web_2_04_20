<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>

        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        input{
            display: none;
        }

        .wrap{
            width: 500px;
            height: 700px;
            border: 3px solid black;
            margin: 0 auto;
            /* overflow: hidden; */
        }

        header{
            height: 60px;
            background-color: lightgray;
            display: flex;
            justify-content: flex-end;
            align-items: center;
            font-size: 50px;
            position: relative;

        }

        /* .menu_btn을 체크하면 .menu_wrap가 left 값이 0으로 변경  */

        .menu_btn{
            z-index: 10;
            position: relative;
            cursor: pointer;
        }

        #btn_input:checked ~ .menu_wrap{
            height: 600px;
        }

        .menu_wrap{
            position: absolute;
            top: 0;
            left: 0%;
            width: 100%;
            height: 0;
            overflow: hidden;
            background-color: gray;
            font-size: 50px;
            transition-duration: 0.5s;
        }

        section{
            height: 500px;
            background-color: lightblue;
            font-size: 30px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

    </style>

</head>
<body>
    
    <div class="wrap">

        <header>
            <input type="checkbox" id="btn_input">
            <label for="btn_input" class="menu_btn"> = </label>

            <div class="menu_wrap">
                메뉴 부모
            </div>
        </header>

        <section>
            섹션
        </section>

    </div>

</body>
</html>
